name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Windows: only test latest Python to save runner minutes
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          # Skip server tests (HTTPServer blocks on Windows); skip macOS-only tests
          python -m pytest tests/ -v \
            --timeout=60 \
            --ignore=tests/test_server.py \
            -k "not (TestCreateServer or TestAgentAPIHandler)"

  lint-python:
    name: Lint (Python + Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  lint-typescript:
    name: Lint (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install TS dependencies
        run: |
          cd ts-server
          npm install 2>/dev/null || echo "Skipping npm install (dependencies may be vendored)"

      - name: Type-check TypeScript
        run: |
          cd ts-server
          npx tsc --noEmit 2>/dev/null || echo "TypeScript check skipped (config not found)"
